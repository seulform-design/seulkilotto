name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  v1-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # easyocr(→torch, ~800MB) 는 CI 러너에서 메모리/네트워크로 불안정하고
      # 앱은 이를 지연 임포트하므로, 핵심 로직 테스트는 easyocr 없이 돌린다.
      # OCR 테스트(test_receipt_parser)는 importorskip 으로 자동 생략된다.
      - run: |
          grep -ivE '^easyocr' backend/requirements.txt > /tmp/ci-req.txt
          pip install -r /tmp/ci-req.txt pytest
      # backend/ 에서 실행해야 `from app...` 임포트가 해석된다. (과거엔 repo
      # 루트에서 돌려 ModuleNotFoundError: app → 수집오류로 CI 상시 실패였음)
      - run: python -m pytest tests/ -q
        working-directory: backend

  v2-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r platform/backend/requirements.txt
      # 연구 서비스 테스트는 lotto_draws 데이터가 필요하다 — CI 의 빈 DB 를
      # 추첨 이력 CSV 로 시드해야 통과(과거엔 미시드라 7개 실패 → CI red).
      - run: python scripts/seed_from_csv.py --csv ../../backend/data/lotto_history.csv
        working-directory: platform/backend
      - run: python -m pytest tests/ -q
        working-directory: platform/backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: platform/frontend
      - run: npm run build
        working-directory: platform/frontend
