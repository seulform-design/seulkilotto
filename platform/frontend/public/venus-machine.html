<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>동행복권 로또 추첨기 (1·2·3호기) — Matter.js 물리 시뮬레이터</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100%; background: radial-gradient(circle at 50% 20%, #1b2438 0%, #0f1420 74%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    display: flex; align-items: flex-start; justify-content: center; overflow: hidden; color: #e8eef5; }
  #wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px; }
  canvas { display: block; border-radius: 16px; }
  #machineSel { display: flex; gap: 8px; }
  .mbtn { font-weight: 800; font-size: 14px; color: #cbd5e1; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 10px; padding: 9px 18px; cursor: pointer; transition: all .15s; }
  .mbtn.active { color: #fff; }
  .mbtn.m1.active { background: #E8570D; border-color: #E8570D; }
  .mbtn.m2.active { background: #0D8A3E; border-color: #0D8A3E; }
  .mbtn.m3.active { background: #2952CC; border-color: #2952CC; }
  #controls { display: flex; gap: 10px; align-items: center; }
  button.ctrl { font-family: inherit; font-weight: 700; font-size: 14px; color: #e8eef5; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.16); border-radius: 10px; padding: 11px 22px; cursor: pointer; transition: all .12s; -webkit-tap-highlight-color: transparent; }
  button.ctrl:hover { background: rgba(255,255,255,0.12); }
  button.ctrl:active { transform: translateY(1px); }
  button.ctrl:disabled { opacity: 0.4; cursor: default; }
  #btnStart { background: #D32F2F; border-color: #D32F2F; }
  #btnStart:hover:not(:disabled) { background: #e14b4b; }
  #sndBtn, #dbgBtn { font-size: 16px; padding: 10px 12px; }
  #status { color: #cfe0f2; font-size: 13.5px; font-weight: 700; height: 18px; text-align: center; }
  #timer { color: #7c8798; font-size: 11.5px; height: 14px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="machineSel">
    <button class="mbtn m1" data-m="1">1호기</button>
    <button class="mbtn m2" data-m="2">2호기</button>
    <button class="mbtn m3 active" data-m="3">3호기</button>
  </div>
  <canvas id="cv"></canvas>
  <div id="status">추첨기를 선택하고 [추첨 시작]을 누르세요</div>
  <div id="timer"></div>
  <div id="controls">
    <button class="ctrl" id="btnStart">추첨 시작</button>
    <button class="ctrl" id="btnReset">초기화</button>
    <button class="ctrl" id="sndBtn" title="사운드">🔊</button>
    <button class="ctrl" id="dbgBtn" title="디버그">🐞</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
'use strict';
(function () {
  const hasMatter = typeof window.Matter !== 'undefined';
  const M = window.Matter || null;

  // ═══ 머신 설정 (machine1/2/3.json 상당) — 공통 MachineEngine 소비 ═══
  // 기계 크기·구조는 3대 모두 '동일'(같은 모델). 호기 차이는 물리·타이밍에만.
  // 공:구 지름비 ≈ 0.09 (실제 동행복권 추첨기 실측 ~0.12 기준 근접). drawInterval=볼 1개당 초(실측 ~5s).
  const DRUM_R = 166, BALL_R = 15;   // 전 호기 공통 크기
  const MACHINE_CONFIGS = {
    1: { name:'1호기', accent:'#E8570D', drumR:DRUM_R, ballR:BALL_R, gravity:1.05, restitution:0.93, friction:0.0004, frictionAir:0.0034, density:0.0012,
      jet:0.090, jetW:0.22, turb:0.006, spin:1.25, drawInterval:5.0, mixSec:6, waitSec:2 },
    2: { name:'2호기', accent:'#0D8A3E', drumR:DRUM_R, ballR:BALL_R, gravity:1.10, restitution:0.88, friction:0.0008, frictionAir:0.0042, density:0.0012,
      jet:0.084, jetW:0.24, turb:0.005, spin:0.85, drawInterval:5.5, mixSec:7, waitSec:2 },
    3: { name:'3호기', accent:'#2952CC', drumR:DRUM_R, ballR:BALL_R, gravity:1.00, restitution:0.94, friction:0.0004, frictionAir:0.0030, density:0.0012,
      jet:0.094, jetW:0.22, turb:0.007, spin:1.05, drawInterval:4.8, mixSec:6, waitSec:2 },
  };
  const TOTAL_DRAW = 7;

  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const LW = 480, LH = 684;
  let DPR = Math.max(1, window.devicePixelRatio || 1);
  function setupCanvas() { DPR = Math.max(1, window.devicePixelRatio || 1);
    cv.width = Math.round(LW*DPR); cv.height = Math.round(LH*DPR);
    cv.style.width = LW+'px'; cv.style.height = LH+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
  setupCanvas(); window.addEventListener('resize', setupCanvas);

  const DRUM_CX = 232, DRUM_CY = 268;    // 구를 낮춰 위에 4구 회전 휠 공간 확보
  const EXIT_W = 28;                      // 상단 배출구 폭
  const HOLDER_Y = 654, HOLDER_X0 = 40, HOLDER_GAP = 62;
  function holderPos(i){ return { x: HOLDER_X0 + i*HOLDER_GAP, y: HOLDER_Y }; }

  function ballColor(n){ return n<=10?'#FBC02D':n<=20?'#1976D2':n<=30?'#D32F2F':n<=40?'#5a5a5a':'#388E3C'; }
  function textColor(n){ return n<=10?'#2a2a2a':'#ffffff'; }
  function lighten(hex, amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt); return 'rgb('+r+','+g+','+b+')'; }
  function shade(hex,f){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; const a=f>=0?f:0,d=f<0?-f:0;
    r=Math.round(r+(255-r)*a-r*d); g=Math.round(g+(255-g)*a-g*d); b=Math.round(b+(255-b)*a-b*d); return 'rgb('+Math.max(0,r)+','+Math.max(0,g)+','+Math.max(0,b)+')'; }

  // ═══ MachineEngine — 공통 엔진(BlowerSystem/AirField/Outlet/Extraction/Rail) ═══
  class MachineEngine {
    constructor(cfg){ this.cfg=cfg; this.cx=DRUM_CX; this.cy=DRUM_CY; this.r=cfg.drumR;
      this.blowing=false; this.gateOpen=false; this.balls=[]; this.railBalls=[]; this.collisions=0;
      this.wheel=0; this.usePhysics=hasMatter;
      this.BZ=32; this.Rr=this.r+this.BZ/2;                       // 테두리 두께/포켓 반경
      this.discSpeed=(Math.PI/2)/(cfg.drawInterval*60);           // 역산: 포켓이 drawInterval마다 12시 도달
      this.exitPhi=Math.PI*0.78;                                  // 12시→좌하단(포켓 이동각) 후 배출
      if(this.usePhysics){ this.engine=M.Engine.create({enableSleeping:false}); this.engine.gravity.y=cfg.gravity; this.world=this.engine.world;
        M.Events.on(this.engine,'collisionStart',(e)=>{ this.collisions+=e.pairs.length; }); }
      this.spawnBalls(); }
    exitPt(){ return { x:this.cx, y:this.cy-this.r }; }                 // 구 상단(휠 진입 직전)
    wheelC(){ return { x:this.cx, y:this.cy-this.r+this.wR()*0.35 }; }    // 구 상단 밀착
    wR(){ return this.r*0.19; }                                          // 구 지름 ~1/5
    clear(){ if(this.usePhysics&&this.world) M.Composite.clear(this.world,false); this.balls=[]; this.railBalls=[]; }

    spawnBalls(){ const c=this.cfg; this.clear();
      const per=Math.max(6,Math.floor((this.r*1.5)/(c.ballR*2+2))); let idx=0;
      for(let n=1;n<=45;n++){ const row=Math.floor(idx/per),col=idx%per,span=(per-1)*(c.ballR*2+2);
        const x=this.cx-span/2+col*(c.ballR*2+2)+(Math.random()-0.5)*2, y=this.cy+this.r-c.ballR-6-row*(c.ballR*2+2);
        const restJ=c.restitution+(Math.random()-0.5)*0.03, densJ=c.density*(1+(Math.random()-0.5)*0.08);
        if(this.usePhysics){ const body=M.Bodies.circle(x,y,c.ballR,{restitution:restJ,friction:c.friction,frictionAir:c.frictionAir,density:densJ,frictionStatic:0});
          M.Composite.add(this.world,body); this.balls.push({body,n}); }
        else this.balls.push({fb:true,n,x,y,vx:0,vy:0,angle:0,av:0,rest:restJ});
        idx++; } }

    // ③ 하단 중앙 집중 에어제트 → 공 폭발적 상승·순환
    applyAirField(b){ const c=this.cfg,p=b.body.position,m=b.body.mass,r=this.r;
      if(Math.abs(p.x-this.cx)<r*c.jetW && p.y>this.cy-r*0.2){ const low=(p.y-(this.cy-r*0.1))/r;
        M.Body.applyForce(b.body,p,{x:(this.cx-p.x)*0.00005*m, y:-c.jet*Math.max(0.2,low)*m}); }
      M.Body.applyForce(b.body,p,{x:(Math.random()-0.5)*c.turb*m, y:(Math.random()-0.5)*c.turb*0.5*m}); }

    // ⑦⑧ 상단 배출: 배출구로 위로 빨아올림(점진 흡입)
    applyLift(b){ const p=b.body.position,m=b.body.mass,ex=this.exitPt();
      if(p.y>this.cy+this.r*0.4) return;                 // 상부의 공만 대상
      const dx=ex.x-p.x, dy=ex.y-p.y, d=Math.hypot(dx,dy)||1;
      const s=Math.min(0.9,0.5+40/(d+6))*0.00019;         // 가까울수록 강
      M.Body.applyForce(b.body,p,{x:dx/d*s*m, y:dy/d*s*m}); }

    step(){ const c=this.cfg;
      // 테두리 회전: 추첨 중이거나 포켓에 실린 공이 있으면 discSpeed, 대기 시 미세 회전
      const spinning=this.blowing||this.gateOpen||this.railBalls.some(rb=>rb.phase==='ring');
      this.wheel += spinning ? this.discSpeed : 0.0016;
      if(this.usePhysics){
        if(this.blowing) for(const b of this.balls) this.applyAirField(b);
        if(this.gateOpen) for(const b of this.balls) this.applyLift(b);
        M.Engine.update(this.engine,1000/60);
        for(const b of this.balls){ const p=b.body.position,dx=p.x-this.cx,dy=p.y-this.cy,d=Math.hypot(dx,dy),lim=this.r-c.ballR;
          if(d>lim){ const nx=dx/d,ny=dy/d; M.Body.setPosition(b.body,{x:this.cx+nx*lim,y:this.cy+ny*lim});
            const v=b.body.velocity,dot=v.x*nx+v.y*ny; M.Body.setVelocity(b.body,{x:(v.x-2*dot*nx)*c.restitution,y:(v.y-2*dot*ny)*c.restitution});
            M.Body.setAngularVelocity(b.body,b.body.angularVelocity+(v.x*ny-v.y*nx)*0.0013*c.spin); } }
      } else this.stepFallback();
      this.tryCapture();
      this.updateRail(); }

    // ⑩ 포켓이 12시를 지날 때, 상단으로 올라온 공을 그 포켓에 담음(진입)
    tryCapture(){ if(!this.gateOpen || this.railBalls.length>=TOTAL_DRAW) return;
      const topA=-Math.PI/2, tol=Math.max(0.13, this.discSpeed*1.5);
      for(let k=0;k<4;k++){ const a=-Math.PI/2 - this.wheel + k*Math.PI/2;
        const d=Math.atan2(Math.sin(a-topA),Math.cos(a-topA));
        if(Math.abs(d)<tol){
          // 상단부(y<cy-r*0.15)로 올라온 공 중 가장 높은 공 선택
          let bi=-1,best=this.cy-this.r*0.15;
          for(let i=0;i<this.balls.length;i++){ const p=this.ballPose(this.balls[i]); if(p.y<best){best=p.y;bi=i;} }
          if(bi>=0) this.capture(bi,k);
          return; } } }

    // 진입: 공을 포켓(k)에 담아 테두리와 함께 CCW로 이동
    capture(i,k){ const b=this.balls[i]; this.balls.splice(i,1);
      if(this.usePhysics) M.Composite.remove(this.world,b.body); this.gateOpen=false;
      const slot=this.railBalls.length;
      this.railBalls.push({ n:b.n, phase:'ring', k, w0:this.wheel, slot,
        x:this.cx, y:this.cy-this.Rr, angle:0, av:0.14, held:false, path:null, wp:0, spd:4.6 });
      if(this.onExtract) this.onExtract(b.n); }

    // ⑨ 레일: (ring)포켓 타고 좌하강 → exitPhi 도달 시 (chute)슈트 타고 홀더로
    updateRail(){ for(const rb of this.railBalls){ if(rb.held) continue;
      if(rb.phase==='ring'){ const phi=this.wheel-rb.w0, a=-Math.PI/2 - phi;
        rb.x=this.cx+Math.cos(a)*this.Rr; rb.y=this.cy+Math.sin(a)*this.Rr; rb.angle=a+Math.PI/2;
        if(phi>=this.exitPhi){ rb.phase='chute'; const tgt=holderPos(rb.slot); rb.av=0.16;
          rb.path=[ {x:rb.x-6,y:rb.y+10}, {x:this.cx-this.r*0.5,y:this.cy+this.r+40}, {x:(rb.x+tgt.x)/2,y:HOLDER_Y-42}, tgt ]; rb.wp=0; } }
      else { const t=rb.path[rb.wp]; if(!t){ rb.held=true; continue; }
        const dx=t.x-rb.x, dy=t.y-rb.y, d=Math.hypot(dx,dy)||1; const spd=(rb.wp>=rb.path.length-2)?rb.spd*0.6:rb.spd;
        rb.x+=dx/d*Math.min(spd,d); rb.y+=dy/d*Math.min(spd,d); rb.angle+=rb.av;
        if(d<3){ rb.wp++; if(rb.wp>=rb.path.length){ rb.held=true; rb.av=0; const tt=rb.path[rb.path.length-1]; rb.x=tt.x; rb.y=tt.y; } } } } }

    stepFallback(){ const c=this.cfg;
      for(const b of this.balls){ b.vy+=c.gravity*0.34;
        if(this.blowing){ const inCol=Math.abs(b.x-this.cx)<this.r*c.jetW;
          if(inCol&&b.y>this.cy-this.r*0.2){ const low=(b.y-(this.cy-this.r*0.1))/this.r; b.vy-=c.jet*40*Math.max(0.2,low); b.vx+=(this.cx-b.x)*0.02; }
          b.vx+=(Math.random()-0.5)*c.turb*40; b.vy+=(Math.random()-0.5)*c.turb*20; }
        if(this.gateOpen&&b.y<this.cy+this.r*0.4){ const ex=this.exitPt(),dx=ex.x-b.x,dy=ex.y-b.y,d=Math.hypot(dx,dy)||1,s=Math.min(0.9,0.5+40/(d+6))*0.7; b.vx+=dx/d*s; b.vy+=dy/d*s; }
        const sp=Math.hypot(b.vx,b.vy); if(sp>18){b.vx=b.vx/sp*18;b.vy=b.vy/sp*18;}
        b.x+=b.vx; b.y+=b.vy; b.angle+=b.av; b.av*=0.985;
        const dx=b.x-this.cx,dy=b.y-this.cy,d=Math.hypot(dx,dy),lim=this.r-c.ballR;
        if(d>lim){const nx=dx/d,ny=dy/d;b.x=this.cx+nx*lim;b.y=this.cy+ny*lim;const dot=b.vx*nx+b.vy*ny;b.vx=(b.vx-2*dot*nx)*c.restitution;b.vy=(b.vy-2*dot*ny)*c.restitution;b.av+=(b.vx*ny-b.vy*nx)*0.013*c.spin;} }
      for(let i=0;i<this.balls.length;i++)for(let j=i+1;j<this.balls.length;j++){const a=this.balls[i],cc=this.balls[j];let dx=cc.x-a.x,dy=cc.y-a.y,d=Math.hypot(dx,dy),mn=c.ballR*2;if(d===0){d=.01;dx=.01}if(d<mn){const nx=dx/d,ny=dy/d,ov=mn-d;a.x-=nx*ov/2;a.y-=ny*ov/2;cc.x+=nx*ov/2;cc.y+=ny*ov/2;const rvx=cc.vx-a.vx,rvy=cc.vy-a.vy,vn=rvx*nx+rvy*ny;if(vn<0){const imp=-(1+c.restitution)*vn/2;a.vx-=imp*nx;a.vy-=imp*ny;cc.vx+=imp*nx;cc.vy+=imp*ny;this.collisions++;}}} }

    ballPose(b){ return this.usePhysics?{x:b.body.position.x,y:b.body.position.y,angle:b.body.angle}:{x:b.x,y:b.y,angle:b.angle}; }
    avgSpeed(){ let s=0,n=0; for(const b of this.balls){const v=this.usePhysics?b.body.velocity:{x:b.vx,y:b.vy};s+=Math.hypot(v.x,v.y);n++;} return n?s/n:0; }
  }

  // ═══ 렌더 ═══
  // 다면체(faceted) 로또 공 — 실제 사진처럼 각진 표면
  function drawBall(x,y,n,r,angle){ const base=ballColor(n); ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
    const N=8;
    for(let i=0;i<N;i++){ const a0=i/N*Math.PI*2, a1=(i+1)/N*Math.PI*2, mid=(a0+a1)/2; const l=0.30*Math.cos(mid+2.3);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,r,a0,a1); ctx.closePath(); ctx.fillStyle=shade(base,l); ctx.fill(); }
    ctx.beginPath(); for(let i=0;i<N;i++){ const a=i/N*Math.PI*2; ctx[i?'lineTo':'moveTo'](Math.cos(a)*r*0.52, Math.sin(a)*r*0.52); } ctx.closePath();
    ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1; ctx.stroke();
    for(let i=0;i<N;i++){ const a=i/N*Math.PI*2; ctx.beginPath(); ctx.moveTo(Math.cos(a)*r*0.52, Math.sin(a)*r*0.52); ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); ctx.strokeStyle='rgba(0,0,0,0.10)'; ctx.stroke(); }
    ctx.fillStyle=textColor(n); ctx.font='bold '+Math.round(r*0.92)+'px "Malgun Gothic", sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(n),0,0.5); ctx.restore(); }
  function roundRectPath(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function perfNow(){ return (typeof performance!=='undefined')?performance.now():Date.now(); }

  function render(eng){ const c=eng.cfg,cx=eng.cx,cy=eng.cy,r=eng.r,gy=cy+r; ctx.clearRect(0,0,LW,LH);

    // ══ 사진 기준 구조 (뒤 → 앞) ══
    const postX=cx+r+8, postTop=cy-r*0.5;
    const BZ=32, Rr=r+BZ/2;                          // 회전 테두리 두께 / 중심반경
    const postG=ctx.createLinearGradient(postX-20,0,postX+20,0);
    postG.addColorStop(0,'#7f8b9a'); postG.addColorStop(0.42,'#c8d1dc'); postG.addColorStop(0.6,'#b0bac8'); postG.addColorStop(1,'#5f6976');
    // ① 바닥 그림자
    ctx.save(); ctx.filter='blur(6px)'; ctx.beginPath(); ctx.ellipse(cx, LH-38, r*0.66, 12, 0, 0, Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.36)'; ctx.fill(); ctx.restore();
    // ② 우측 지지 기둥 (구 뒤)
    ctx.fillStyle=postG; roundRectPath(postX-19, postTop, 38, (LH-42)-postTop, 18); ctx.fill();
    // ③ 하단: 목 → 아크릴 베이스 → 삼각 트러스 → 반원 톱니 레일
    const baseTop=gy+92;
    ctx.fillStyle='rgba(196,210,228,0.16)'; ctx.strokeStyle='rgba(210,225,242,0.28)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx-28,gy-4); ctx.lineTo(cx+28,gy-4); ctx.lineTo(cx+62,baseTop); ctx.lineTo(cx-62,baseTop); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='rgba(188,203,224,0.5)'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(cx-38,baseTop); ctx.lineTo(cx,gy+26); ctx.lineTo(cx+38,baseTop); ctx.stroke();
    ctx.strokeStyle='rgba(190,205,224,0.5)'; ctx.lineWidth=7; ctx.beginPath(); ctx.arc(cx,gy+30,52,Math.PI*0.18,Math.PI*0.82); ctx.stroke();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(210,225,242,0.45)'; for(let t=0;t<=12;t++){ const a=Math.PI*0.18+(Math.PI*0.64)*(t/12); ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*48,gy+30+Math.sin(a)*48); ctx.lineTo(cx+Math.cos(a)*58,gy+30+Math.sin(a)*58); ctx.stroke(); }
    ctx.lineWidth=1;
    // ④ 배출 슈트 (테두리 좌하단 배출 → 홀더)
    const exOut={ x:cx+Math.cos(Math.PI*0.75)*Rr, y:cy+Math.sin(Math.PI*0.75)*Rr };
    ctx.strokeStyle='rgba(190,212,240,0.20)'; ctx.lineWidth=c.ballR*2+8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(exOut.x-2, exOut.y+2); ctx.quadraticCurveTo(cx-r*0.5, gy+34, HOLDER_X0+4, HOLDER_Y-4); ctx.stroke(); ctx.lineCap='butt';
    // ⑤ 홀더 (7슬롯 + 보너스)
    for(let i=0;i<TOTAL_DRAW;i++){ const p=holderPos(i),bonus=(i===TOTAL_DRAW-1);
      ctx.beginPath(); ctx.arc(p.x,p.y,c.ballR+4,0,Math.PI*2); ctx.fillStyle=bonus?'rgba(80,140,255,0.14)':'rgba(255,255,255,0.07)'; ctx.fill();
      ctx.lineWidth=bonus?2:1; ctx.strokeStyle=bonus?'rgba(90,150,255,0.8)':'rgba(255,255,255,0.28)'; ctx.stroke(); }
    const pb=holderPos(TOTAL_DRAW-1); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='bold 17px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('+', pb.x-HOLDER_GAP/2, pb.y);
    // ⑥ 회전 테두리(틀) — 구 전체를 감싸는 두꺼운 금속 링
    const bez=ctx.createLinearGradient(cx-r,cy-r,cx+r,cy+r); bez.addColorStop(0,'#f4f7fa'); bez.addColorStop(0.34,'#c6cfda'); bez.addColorStop(0.56,'#8b96a4'); bez.addColorStop(1,'#59636f');
    ctx.beginPath(); ctx.arc(cx,cy,Rr,0,Math.PI*2); ctx.lineWidth=BZ; ctx.strokeStyle=bez; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2); ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,r+BZ-2,0,Math.PI*2); ctx.lineWidth=2; ctx.strokeStyle='rgba(58,68,82,0.5)'; ctx.stroke();
    // 회전 눈금(테두리가 도는 것이 보이도록)
    ctx.strokeStyle='rgba(70,80,94,0.3)'; ctx.lineWidth=1.5;
    for(let t=0;t<48;t++){ const a=-eng.wheel + t*Math.PI*2/48; ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*(r+4), cy+Math.sin(a)*(r+4)); ctx.lineTo(cx+Math.cos(a)*(r+BZ-4), cy+Math.sin(a)*(r+BZ-4)); ctx.stroke(); }
    ctx.lineWidth=1;
    // ⑦ 4배출구 포켓(90° 간격) — 12시 진입, CCW(좌하강). 사진의 배출구·좌우포트·하단이 이 4개
    for(let k=0;k<4;k++){ const a=-Math.PI/2 - eng.wheel + k*Math.PI/2;
      const px=cx+Math.cos(a)*Rr, py=cy+Math.sin(a)*Rr;
      ctx.beginPath(); ctx.arc(px,py, c.ballR+4, 0, Math.PI*2); ctx.fillStyle='rgba(22,30,44,0.72)'; ctx.fill();
      ctx.strokeStyle='rgba(244,248,252,0.7)'; ctx.lineWidth=2.5; ctx.stroke(); }
    ctx.lineWidth=1;
    // ⑧ 유리 구
    const gg=ctx.createRadialGradient(cx-r*0.34,cy-r*0.42,r*0.1,cx,cy,r);
    gg.addColorStop(0,'rgba(255,255,255,0.16)'); gg.addColorStop(0.86,'rgba(30,42,66,0.05)'); gg.addColorStop(1,'rgba(90,110,140,0.16)');
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=gg; ctx.fill();
    // ⑨ 내부 칸막이 (구 안쪽으로 클립)
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
    ctx.strokeStyle='rgba(200,215,235,0.14)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(cx,cy-r*0.72); ctx.lineTo(cx,cy+r*0.5); ctx.stroke();
    for(const yy of [-0.25,0.15]){ const yv=cy+r*yy, hw=Math.sqrt(Math.max(0,r*r-(yv-cy)*(yv-cy)))*0.84; ctx.beginPath(); ctx.moveTo(cx-hw,yv); ctx.lineTo(cx+hw,yv); ctx.stroke(); }
    ctx.restore();
    // ⑩ 구동 커플링 (우측 기둥 → 회전 테두리)
    ctx.strokeStyle=postG; ctx.lineWidth=20; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(-0.55)*Rr, cy+Math.sin(-0.55)*Rr); ctx.lineTo(postX, cy-r*0.15); ctx.stroke(); ctx.lineCap='butt'; ctx.lineWidth=1;
    // ⑪ 드럼 안 공(다면체) — 구 경계로 클립(이탈 방지)
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r-1,0,Math.PI*2); ctx.clip();
    for(const b of eng.balls){ const p=eng.ballPose(b); drawBall(p.x,p.y,b.n,c.ballR,p.angle); }
    ctx.restore();
    // ⑫ 림
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.lineWidth=4; ctx.strokeStyle='#aeb8c6'; ctx.stroke(); ctx.lineWidth=1;
    // ⑬ 유리 하이라이트
    ctx.beginPath(); ctx.ellipse(cx-r*0.4, cy-r*0.5, r*0.26, r*0.12, -0.5, 0, Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fill();

    // 레일/홀더 위 공
    for(const rb of eng.railBalls) drawBall(rb.x, rb.y, rb.n, c.ballR, rb.angle);

    // 버전 표시
    ctx.fillStyle='rgba(255,255,255,0.30)'; ctx.font='10px monospace'; ctx.textAlign='right'; ctx.textBaseline='bottom'; ctx.fillText('실측디테일 v11 · '+c.name, LW-8, LH-6);

    // 디버그
    if(DEBUG){ ctx.fillStyle='rgba(0,0,0,0.55)'; roundRectPath(8,8,152,92,8); ctx.fill();
      ctx.fillStyle='#7CFFB2'; ctx.font='bold 11px monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
      ['FPS: '+fps.toFixed(0),'공 평균속도: '+eng.avgSpeed().toFixed(2),'충돌/초: '+collisionsPerSec,'송풍: '+(eng.blowing?'ON':'OFF'),'드럼R: '+r+' 볼: '+eng.balls.length,'단계: '+phase].forEach((t,i)=>ctx.fillText(t,16,16+i*13)); } }

  // ═══ SoundSystem ═══
  const Sound = { ac:null, blowerGain:null, on:true,
    ensure(){ if(this.ac) return; try{ this.ac=new (window.AudioContext||window.webkitAudioContext)();
      const buf=this.ac.createBuffer(1,this.ac.sampleRate*2,this.ac.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const src=this.ac.createBufferSource(); src.buffer=buf; src.loop=true; const lp=this.ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=360;
      this.blowerGain=this.ac.createGain(); this.blowerGain.gain.value=0; src.connect(lp); lp.connect(this.blowerGain); this.blowerGain.connect(this.ac.destination); src.start(); }catch(e){this.ac=null;} },
    blower(v){ if(this.ac&&this.blowerGain) this.blowerGain.gain.setTargetAtTime(this.on?v:0,this.ac.currentTime,0.15); },
    ding(){ if(!this.ac||!this.on)return; const o=this.ac.createOscillator(),g=this.ac.createGain(); o.type='triangle'; o.frequency.value=640;
      g.gain.setValueAtTime(0.0001,this.ac.currentTime); g.gain.exponentialRampToValueAtTime(0.25,this.ac.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.0001,this.ac.currentTime+0.35);
      o.connect(g); g.connect(this.ac.destination); o.start(); o.stop(this.ac.currentTime+0.36); } };

  // ═══ 추첨 시퀀스 ═══
  let engine=new MachineEngine(MACHINE_CONFIGS[3]); let currentM=3, phase='idle', phaseT=0, drawCount=0, plan=null; let DEBUG=false;
  const statusEl=document.getElementById('status'), timerEl=document.getElementById('timer'), btnStart=document.getElementById('btnStart');
  engine.onExtract=()=>Sound.ding();
  function setStatus(t){ statusEl.textContent=t; } function rand(a,b){ return a+Math.random()*(b-a); }
  function startDraw(){ if(phase!=='idle'&&phase!=='done')return; engine.spawnBalls(); drawCount=0; const c=engine.cfg;
    // 실측 기준: 볼 1개당 drawInterval초 → 테두리 회전속도(discSpeed)도 역산 일치
    const gap=c.drawInterval, mixSec=c.mixSec, waitSec=c.waitSec, total=waitSec+mixSec+TOTAL_DRAW*gap;
    plan={total,waitF:Math.round(waitSec*60),mixF:Math.round(mixSec*60),gapF:Math.round(gap*60),startTime:perfNow()};
    phase='wait'; phaseT=0; engine.blowing=false; engine.gateOpen=false; btnStart.disabled=true; Sound.ensure(); setStatus('추첨 준비 — '+waitSec+'초 대기…'); }
  function reset(){ phase='idle'; phaseT=0; drawCount=0; engine.spawnBalls(); engine.blowing=false; engine.gateOpen=false; Sound.blower(0); btnStart.disabled=false; setStatus('추첨기를 선택하고 [추첨 시작]을 누르세요'); timerEl.textContent=''; }
  function selectMachine(m){ if(phase!=='idle'&&phase!=='done')return; currentM=m; engine=new MachineEngine(MACHINE_CONFIGS[m]); engine.onExtract=()=>Sound.ding();
    document.querySelectorAll('.mbtn').forEach(el=>el.classList.toggle('active',+el.dataset.m===m)); reset(); }
  function tickSequence(){ if(phase==='idle'||phase==='done')return; phaseT++; const c=engine.cfg;
    if(phase==='wait'){ setStatus('추첨 준비 — '+Math.max(0,Math.ceil((plan.waitF-phaseT)/60))+'초'); if(phaseT>=plan.waitF){ phase='mixing'; phaseT=0; engine.blowing=true; Sound.blower(0.17); setStatus('송풍기 가동 — 공 상승·혼합 중…'); } }
    else if(phase==='mixing'){ setStatus('송풍기 가동 — 공 상승·혼합 중…'); if(phaseT>=plan.mixF){ phase='drawing'; phaseT=0; engine.gateOpen=true; setStatus('1번째 공 추첨 중…'); } }
    else if(phase==='drawing'){ const held=engine.railBalls.length;
      if(held>drawCount){ drawCount=held;
        if(drawCount>=TOTAL_DRAW){ phase='done'; engine.blowing=false; engine.gateOpen=false; Sound.blower(0); const nums=engine.railBalls.map(b=>b.n); setStatus('추첨 종료 — '+nums.slice(0,6).join(', ')+' + '+nums[6]); btnStart.disabled=false; notifyParent(nums); }
        else { engine.gateOpen=false; phaseT=0; } }
      if(phase==='drawing'&&drawCount<TOTAL_DRAW&&!engine.gateOpen&&phaseT>=plan.gapF){ engine.gateOpen=true; setStatus(drawCount===TOTAL_DRAW-1?'보너스 볼 추첨 중…':(drawCount+1)+'번째 공 추첨 중…'); } }
    if(plan) timerEl.textContent='경과 '+((perfNow()-plan.startTime)/1000).toFixed(1)+'s / 예상 '+plan.total.toFixed(0)+'s · '+c.name; }
  function notifyParent(nums){ try{ window.parent&&window.parent.postMessage({type:'venus-draw',machine:currentM,numbers:nums},'*'); }catch(e){} }

  // ═══ 루프 ═══
  let acc=0,last=0,fps=60,fpsAcc=0,fpsN=0,collisionsPerSec=0,colWindow=0,colTimer=0; const STEP=1000/60;
  function loop(ts){ if(!last)last=ts; const dt=Math.min(80,ts-last); last=ts;
    if(dt>0){ const inst=1000/dt; fpsAcc+=inst; fpsN++; if(fpsN>=15){ fps=fpsAcc/fpsN; fpsAcc=0; fpsN=0; } }
    acc+=dt; let it=0; while(acc>=STEP&&it<4){ engine.step(); tickSequence(); acc-=STEP; it++; }
    colTimer+=dt; colWindow+=engine.collisions; engine.collisions=0; if(colTimer>=1000){ collisionsPerSec=colWindow; colWindow=0; colTimer=0; }
    render(engine); requestAnimationFrame(loop); }

  document.querySelectorAll('.mbtn').forEach(el=>el.addEventListener('click',()=>selectMachine(+el.dataset.m)));
  btnStart.addEventListener('click', startDraw);
  document.getElementById('btnReset').addEventListener('click', reset);
  document.getElementById('sndBtn').addEventListener('click', function(){ Sound.ensure(); Sound.on=!Sound.on; this.textContent=Sound.on?'🔊':'🔇'; if(!Sound.on)Sound.blower(0); else if(engine.blowing)Sound.blower(0.17); });
  document.getElementById('dbgBtn').addEventListener('click', function(){ DEBUG=!DEBUG; this.style.opacity=DEBUG?1:0.5; });
  window.addEventListener('keydown', e=>{ if(e.key==='d'||e.key==='D') DEBUG=!DEBUG; });

  if(!hasMatter) setStatus('물리엔진 로드 실패 — 폴백 물리로 동작합니다');
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
