name: Deploy to Railway

on:
  push:
    branches:
      - main
      - "cursor/**"
  workflow_dispatch:

concurrency:
  group: railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Railway deploy
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    permissions:
      contents: read
    env:
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
      RAILWAY_PUBLIC_URL: ${{ vars.RAILWAY_PUBLIC_URL }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Railway configuration
        id: cfg
        run: |
          if [ -n "$RAILWAY_TOKEN" ] && [ -n "$RAILWAY_PROJECT_ID" ] && [ -n "$RAILWAY_ENVIRONMENT_ID" ] && [ -n "$RAILWAY_SERVICE_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy latest pushed commit
        if: ${{ steps.cfg.outputs.configured == 'true' }}
        run: |
          railway up --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT_ID" \
            --service "$RAILWAY_SERVICE_ID"

      - name: Publish deployment summary
        if: ${{ steps.cfg.outputs.configured == 'true' && env.RAILWAY_PUBLIC_URL != '' }}
        run: |
          {
            echo "### Railway deployment"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- URL: ${RAILWAY_PUBLIC_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Explain missing Railway settings
        if: ${{ steps.cfg.outputs.configured != 'true' }}
        run: |
          echo "Railway auto-deploy skipped."
          echo "Set GitHub secret RAILWAY_TOKEN and repository variables RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID, RAILWAY_SERVICE_ID."
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "Main branch pushes must deploy to production, but Railway settings are missing." >&2
            exit 1
          fi

      - name: Smoke test production API
        if: ${{ steps.cfg.outputs.configured == 'true' && env.RAILWAY_PUBLIC_URL != '' }}
        run: |
          python3 - <<'PY'
          import json, sys, urllib.request
          base = "${RAILWAY_PUBLIC_URL}".rstrip("/")
          url = f"{base}/api/v1/meta"
          try:
              with urllib.request.urlopen(url, timeout=60) as r:
                  body = r.read().decode("utf-8", "ignore")
              data = json.loads(body)
              if not isinstance(data, dict) or "latest_round" not in data:
                  raise RuntimeError(f"unexpected response: {body[:300]}")
              print(f"Smoke test OK: {url} -> latest_round={data.get('latest_round')}, current_round={data.get('current_round')}")
          except Exception as exc:
              print(f"Smoke test failed for {url}: {exc}", file=sys.stderr)
              raise
          PY
